<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Gmail Creator Pro - Multi Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #7b2ffc;
            --danger: #ff6b6b;
            --success: #00b894;
            --warning: #fdcb6e;
            --bg-dark: #0a0a1a;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text: #fff;
            --text-muted: #888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            min-height: 100vh;
            padding: 10px;
            color: var(--text);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 10px 0;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--danger));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
            to { text-shadow: 0 0 40px rgba(123, 47, 252, 0.5); }
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.8em;
        }

        /* LANGUAGE SELECTOR */
        .lang-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0;
        }

        .lang-btn {
            padding: 5px 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7em;
            transition: all 0.3s;
        }

        .lang-btn:hover, .lang-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
        }

        /* CONTROL PANEL */
        .control-panel {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            text-align: center;
            font-weight: bold;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 5px 25px rgba(0, 212, 255, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #ee5a24);
            color: #fff;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #00a86b);
            color: #fff;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #f39c12);
            color: #fff;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: #fff;
        }

        .btn-pink {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* QUICK BUTTONS */
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .quick-btn {
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 212, 255, 0.1);
        }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .option-item label {
            font-size: 0.8em;
            color: var(--text-muted);
            cursor: pointer;
        }

        .switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #333;
            transition: 0.3s;
            border-radius: 22px;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background: var(--primary);
        }

        .switch input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* PROGRESS */
        .progress-container {
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--danger));
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* MAIL LIST */
        .mail-list {
            max-height: 350px;
            overflow-y: auto;
            margin: 10px 0;
            border-radius: 12px;
            padding: 5px;
        }

        .mail-list::-webkit-scrollbar {
            width: 4px;
        }

        .mail-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .mail-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }

        .mail-item {
            padding: 10px 12px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.3s ease;
            transition: all 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .mail-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .mail-text {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            font-weight: bold;
            word-break: break-all;
        }

        .mail-actions {
            display: flex;
            gap: 5px;
        }

        .mail-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8em;
            transition: 0.3s;
        }

        .mail-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 10px 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .label {
            color: var(--text-muted);
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-item .value {
            color: var(--primary);
            font-size: 1.1em;
            font-weight: bold;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: none;
            max-width: 90%;
            text-align: center;
            font-size: 0.9em;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .notification.show {
            display: block;
        }
        .notification.success { border-color: var(--success); }
        .notification.error { border-color: var(--danger); }
        .notification.info { border-color: var(--primary); }

        /* COLOR CLASSES */
        .c1 { color: #00d4ff; }
        .c2 { color: #7b2ffc; }
        .c3 { color: #00b894; }
        .c4 { color: #ff6b6b; }
        .c5 { color: #fdcb6e; }
        .c6 { color: #fd79a8; }
        .c7 { color: #00cec9; }
        .c8 { color: #e17055; }
        .c9 { color: #a29bfe; }
        .c10 { color: #55efc4; }

        /* FILTER SECTION */
        .filter-section {
            display: none;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .filter-section.active {
            display: block;
        }

        .filter-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .header h1 { font-size: 1.4em; }
            .btn { font-size: 0.75em; padding: 10px; }
            .quick-buttons { grid-template-columns: repeat(3, 1fr); }
            .options-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr 1fr 1fr; }
            .btn-group { grid-template-columns: 1fr; }
            .mail-text { font-size: 0.75em; }
        }

        /* DARK MODE TOGGLE */
        .dark-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 212, 255, 0.3);
            z-index: 100;
            transition: 0.3s;
        }

        .dark-toggle:hover {
            transform: scale(1.1);
        }

        /* EXPORT SECTION */
        .export-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }

        /* LOADING SPINNER */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
