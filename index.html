<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Oluşturucu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #fff;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .lang-section {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .lang-btn {
            padding: 4px 10px;
            border: 1px solid #333;
            border-radius: 15px;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 11px;
            transition: 0.3s;
        }
        .lang-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 14px;
            border: 1px solid #333;
            border-radius: 12px;
            background: #0f0f1a;
            color: #fff;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            outline: none;
        }
        .input-area input:focus {
            border-color: #00d4ff;
        }
        .main-buttons {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
        }
        .btn-danger {
            background: #e74c3c;
        }
        .btn-success {
            background: #2ecc71;
        }
        .quick-area {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .quick-btn {
            padding: 10px 0;
            border: 1px solid #333;
            border-radius: 10px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }
        .quick-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #0f0f1a;
            border-radius: 10px;
            font-size: 13px;
            color: #ccc;
        }
        .option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00d4ff;
        }
        .option select {
            flex: 1;
            padding: 6px 8px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .option input[type="number"] {
            width: 50px;
            padding: 6px;
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            outline: none;
        }
        .progress {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7b2ffc);
            transition: width 0.3s;
        }
        .mail-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .mail-list::-webkit-scrollbar {
            width: 4px;
        }
        .mail-list::-webkit-scrollbar-thumb {
            background: #7b2ffc;
            border-radius: 2px;
        }
        .mail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            background: #0f0f1a;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .mail-text {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            word-break: break-all;
            flex: 1;
        }
        .mail-actions {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }
        .mail-actions button {
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #888;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .mail-actions button:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .empty-message {
            text-align: center;
            color: #555;
            padding: 30px 0;
            font-size: 14px;
        }
        .empty-message span {
            display: block;
            font-size: 12px;
            color: #444;
            margin-top: 4px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #222;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #00d4ff;
            margin-top: 2px;
        }
        .c1 { color: #00d4ff; }
        .c2 { color: #7b2ffc; }
        .c3 { color: #2ecc71; }
        .c4 { color: #e74c3c; }
        .c5 { color: #f1c40f; }
        .c6 { color: #fd79a8; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(0,0,0,0.95);
            border: 1px solid #333;
            color: #fff;
            font-size: 14px;
            z-index: 999;
            display: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .toast.success { border-color: #2ecc71; }
        .toast.error { border-color: #e74c3c; }
        .toast.info { border-color: #00d4ff; }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .main-buttons { grid-template-columns: 1fr; }
            .quick-area { grid-template-columns: repeat(4, 1fr); }
            .options { grid-template-columns: 1fr; }
        }
    </style>
</head>

<div class="container">
    <h1 id="title">📧 Gmail Oluşturucu</h1>
    <p class="subtitle" id="subtitle">⚡ 6 haneli · Sadece harf</p>

    <div class="lang-section" id="langSection">
        <button class="lang-btn active" data-lang="tr" onclick="setLang('tr')">🇹🇷 TR</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
        <button class="lang-btn" data-lang="de" onclick="setLang('de')">🇩🇪 DE</button>
        <button class="lang-btn" data-lang="es" onclick="setLang('es')">🇪🇸 ES</button>
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">🇫🇷 FR</button>
        <button class="lang-btn" data-lang="it" onclick="setLang('it')">🇮🇹 IT</button>
        <button class="lang-btn" data-lang="pt" onclick="setLang('pt')">🇵🇹 PT</button>
        <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">🇷🇺 RU</button>
        <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">🇸🇦 AR</button>
        <button class="lang-btn" data-lang="ja" onclick="setLang('ja')">🇯🇵 JA</button>
        <button class="lang-btn" data-lang="ko" onclick="setLang('ko')">🇰🇷 KO</button>
        <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">🇨🇳 ZH</button>
    </div>

    <div class="input-area">
        <input type="number" id="countInput" value="10" min="1" max="10000">
    </div>

    <div class="main-buttons">
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">🚀 OLUŞTUR</button>
        <button class="btn btn-danger" onclick="clearAll()">🗑️ TEMİZLE</button>
        <button class="btn btn-success" onclick="saveAll()">💾 KAYDET</button>
    </div>

    <div class="quick-area">
        <button class="quick-btn" onclick="quickGen(1)">1</button>
        <button class="quick-btn" onclick="quickGen(5)">5</button>
        <button class="quick-btn" onclick="quickGen(10)">10</button>
        <button class="quick-btn" onclick="quickGen(50)">50</button>
        <button class="quick-btn" onclick="quickGen(100)">100</button>
        <button class="quick-btn" onclick="quickGen(500)">500</button>
        <button class="quick-btn" onclick="quickGen(1000)">1000</button>
        <button class="quick-btn" onclick="quickGen(5000)">5000</button>
        <button class="quick-btn" onclick="quickGen(10000)">10000</button>
        <button class="quick-btn" onclick="copyAll()">📋 KOPYALA</button>
        <button class="quick-btn" onclick="uniqueOnly()">🔁 TEKİL</button>
        <button class="quick-btn" onclick="sortEmails()">📊 SIRALA</button>
    </div>

    <div class="options">
        <div class="option">
            <input type="checkbox" id="optNumbers">
            <label id="lblNumbers">Sayı Ekle</label>
        </div>
        <div class="option">
            <input type="checkbox" id="optUppercase">
            <label id="lblUppercase">Büyük Harf</label>
        </div>
        <div class="option">
            <input type="checkbox" id="optSpecial">
            <label id="lblSpecial">Özel Karakter</label>
        </div>
        <div class="option">
            <input type="checkbox" id="optDots">
            <label id="lblDots">Nokta Ekle</label>
        </div>
        <div class="option">
            <label id="lblLength">Uzunluk:</label>
            <input type="number" id="lengthInput" value="6" min="3" max="15">
        </div>
        <div class="option">
            <label id="lblDomain">Domain:</label>
            <select id="domainSelect">
                <option value="@gmail.com">@gmail.com</option>
                <option value="@yahoo.com">@yahoo.com</option>
                <option value="@outlook.com">@outlook.com</option>
                <option value="@hotmail.com">@hotmail.com</option>
                <option value="@protonmail.com">@protonmail.com</option>
            </select>
        </div>
    </div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="mail-list" id="mailList">
        <div class="empty-message" id="emptyMsg">
            📭 Henüz mail yok
            <span>"Oluştur" butonuna tıkla</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label" id="statTotal">Toplam</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label" id="statUnique">Benzersiz</div>
            <div class="stat-value" id="uniqueCount">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label" id="statSpeed">Hız</div>
            <div class="stat-value" id="speedDisplay">0/s</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
